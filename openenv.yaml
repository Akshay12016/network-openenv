name: network-optimizer

actions:
  - reroute
  - increase_bandwidth
  - do_nothing

state:
  - latency
  - packet_loss
  - utilization
  - queue

reward: multi_objective

tasks:
  - name: easy
    description: Optimize latency
    grader:
      type: score
      min: 0.0
      max: 1.0

  - name: medium
    description: Optimize latency and packet loss
    grader:
      type: score
      min: 0.0
      max: 1.0

  - name: hard
    description: Full network optimization
    grader:
      type: score
      min: 0.0
      max: 1.0
